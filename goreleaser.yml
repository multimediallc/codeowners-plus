version: 2

project_name: codeowners-cli
before:
  hooks:
    # You may remove this if you don't use go modules.
    - go mod tidy
builds:
  # You can have multiple builds defined as a yaml list
  - id: "cli"
    main: ./tools/cli
    binary: >-
      {{ .ProjectName }}
      {{- if eq .Os "windows" }}.exe{{ end }}
    env:
      - CGO_ENABLED=0
    ldflags:
      - -extldflags=-static
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
  # The binary the GitHub Action downloads and runs (root main.go).
  - id: "action"
    main: .
    binary: codeowners-plus-action
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s
      - -w
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
archives:
  - id: "cli"
    ids: ["cli"]
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "386" }}i386
      {{- else }}{{ .Arch }}{{ end }}
      {{- if .Arm }}v{{ .Arm }}{{ end -}}
    files:
      - none*
  - id: "action"
    ids: ["action"]
    name_template: "codeowners-plus-action_{{ .Os }}_{{ .Arch }}"
    files:
      - none*
checksum:
  name_template: 'checksums.txt'
snapshot:
  version_template: "{{ .Tag }}-next"
changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
