name: 'Rerun Code Owners'

on:
  pull_request_review:
    types: [submitted, dismissed]

permissions: {}

jobs:
  rerun-codeowners:
    name: 'Rerun Codeowners Plus'
    runs-on: ubuntu-latest
    permissions:
      actions: write
      pull-requests: write
      checks: read
    steps:
      - name: 'Rerun Checks'
        uses: shqear93/rerun-checks@b14eb6a7f66a0b9cffd79e9e85336c78d8c9e21b  # @v3
        with:
          github-token: '${{ secrets.GITHUB_TOKEN }}'
          check-names: 'Run Codeowners Plus'
