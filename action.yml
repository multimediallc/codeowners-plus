name: 'Codeowners Plus'
description: 'Feature-rich alternative to GitHub Code Owners for monoliths and mono-repos'
author: 'Hans Baker'
branding:
  icon: 'plus-circle'
  color: 'blue'
inputs:
  github-token:
    description: 'Github API token'
    required: true
  pr:
    description: 'Pull request number'
    required: true
  repository:
    description: 'The owner and repository name.  For example `octocat/Hello-World`'
    required: true
    default: '${{ github.repository }}'
  verbose:
    description: 'Print debug info'
    required: false
    default: false
  quiet:
    description: 'Disable PR comments and review requests'
    required: false
    default: false

outputs:
  data:
    description: 'JSON string containing all the codeowners data (success, message, file-owners, file-optional, still-required)'
    value: ${{ steps.run.outputs.data }}

runs:
  using: 'composite'
  steps:
    - name: 'Resolve codeowners-plus binary'
      id: resolve
      shell: bash
      env:
        # Non-empty only in release commits: set by scripts/prepare-release.sh
        # and cleared by scripts/post-release.sh. When the action is pinned to
        # exactly this release tag, the prebuilt release binary is downloaded
        # and checksum-verified; any other ref (branch or commit SHA) builds
        # from the pinned source instead, so a pin never resolves to anything
        # newer than itself.
        RELEASE_VERSION: ''
        ACTION_REF: ${{ github.action_ref }}
        ACTION_REPO: ${{ github.action_repository }}
        ACTION_PATH: ${{ github.action_path }}
      run: '"${ACTION_PATH}/scripts/action-binary.sh" resolve'

    - name: 'Restore cached binary'
      id: bincache
      if: steps.resolve.outputs.cache-key != ''
      uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
      with:
        path: ${{ steps.resolve.outputs.bin }}
        key: ${{ steps.resolve.outputs.cache-key }}

    # Downloads and checksum-verifies the release binary on a cache miss;
    # re-verifies the restored binary against the release checksums.txt on a
    # cache hit (Actions caches are repo-scoped and writable by workflows in
    # the consuming repo, so a cached binary is not trusted blindly).
    - name: 'Ensure release binary'
      if: steps.resolve.outputs.mode == 'download'
      shell: bash
      env:
        RELEASE_VERSION: ${{ steps.resolve.outputs.version }}
        ACTION_REPO: ${{ github.action_repository }}
        ACTION_PATH: ${{ github.action_path }}
        ASSET: ${{ steps.resolve.outputs.asset }}
        BIN: ${{ steps.resolve.outputs.bin }}
      run: '"${ACTION_PATH}/scripts/action-binary.sh" ensure'

    - name: 'Set up Go'
      if: steps.resolve.outputs.mode == 'build' && steps.bincache.outputs.cache-hit != 'true'
      uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
      with:
        go-version-file: ${{ github.action_path }}/go.mod
        cache: false

    - name: 'Build codeowners-plus from source'
      if: steps.resolve.outputs.mode == 'build' && steps.bincache.outputs.cache-hit != 'true'
      shell: bash
      env:
        ACTION_PATH: ${{ github.action_path }}
        BIN: ${{ steps.resolve.outputs.bin }}
      run: |
        mkdir -p "$(dirname "$BIN")"
        cd "${ACTION_PATH}"
        CGO_ENABLED=0 go build -ldflags="-s -w" -o "$BIN" .

    - name: 'Run codeowners-plus'
      id: run
      shell: bash
      env:
        # The hyphenated INPUT_GITHUB-TOKEN name is intentional: it mirrors
        # what Docker actions export and is exactly what main.go reads via
        # os.LookupEnv. Bash passes non-identifier env vars through to child
        # processes untouched.
        INPUT_GITHUB-TOKEN: ${{ inputs.github-token }}
        INPUT_PR: ${{ inputs.pr }}
        INPUT_REPOSITORY: ${{ inputs.repository }}
        INPUT_VERBOSE: ${{ inputs.verbose }}
        INPUT_QUIET: ${{ inputs.quiet }}
        BIN: ${{ steps.resolve.outputs.bin }}
      run: '"${BIN}"'
